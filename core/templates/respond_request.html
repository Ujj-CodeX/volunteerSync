{% extends 'base.html' %}
{% block content %}

<div class="row mb-4">
    <div class="col">
        <h4 class="fw-bold text-dark">Respond to Request</h4>
        <p class="text-muted">Let the admin know your availability</p>
    </div>
    <div class="col-auto">
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-2"></i>Back
        </a>
    </div>
</div>

<div class="card p-4" style="max-width:600px;">
    <div class="mb-4">
        <h5 class="fw-bold">{{ vr.title }}</h5>
        <p class="text-muted">{{ vr.description }}</p>
        <div class="d-flex gap-3 mt-3">
            <span class="badge bg-light text-dark p-2">
                <i class="fas fa-map-marker-alt me-1 text-primary"></i>{{ vr.region }}, {{ vr.area }}
            </span>
            <span class="badge bg-light text-dark p-2">
                <i class="fas fa-calendar me-1 text-danger"></i>Deadline: {{ vr.deadline }}
            </span>
        </div>
    </div>

    <hr>

    <form method="POST">
        {% csrf_token %}
        <p class="fw-semibold mb-3">Are you available for this request?</p>
        <div class="d-flex gap-3">
            <button type="submit" name="status" value="accepted" class="btn btn-success px-4">
                <i class="fas fa-check me-2"></i>Yes, I'll be there
            </button>
            <button type="submit" name="status" value="rejected" class="btn btn-outline-danger px-4">
                <i class="fas fa-times me-2"></i>Main nahi aaunga
            </button>
        </div>
    </form>
</div>

{% endblock %}
